name: Initialize cluster and deploy application
description: Initialize cluster and deploy application

inputs:
  namespace:
    description: The namespace to deploy the application to
    required: false
    default: test
  llm:
    description: The LLM to use
    required: false
    default: llama-4-scout-17b-16e-w4a16
  llm_id:
    description: The LLM ID
    required: false
    default: llama-4-scout-17b-16e-w4a16
  llm_url:
    description: The LLM URL
    required: false
    default: https://llama-4-scout-17b-16e-w4a16-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1
  llm_api_token:
    description: The LLM API token
    required: false
    default: ${{ secrets.LLM_API_TOKEN }}

runs:
  steps:

    - name: Install Kind
      run: go install sigs.k8s.io/kind@v0.30.0
      shell: bash

    - name: Create Kind Cluster
      run: ./scripts/ci/kind.sh
      shell: bash    

    - name: Build Operator Image
      run: make helm-install NAMESPACE=${{inputs.namespace}} LLM=${{inputs.llm}} LLM_ID=${{inputs.llm_id}} LLM_URL=${{inputs.llm_url}} LLM_API_TOKEN=${{inputs.llm_api_token}}
      shell: bash
      timeout-minutes: 30
